name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint Python and YAML
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Validate Python syntax
      run: |
        python3 -c "import ast, pathlib; [ast.parse(f.read_text()) for f in pathlib.Path('scripts').glob('*.py')]"

    - name: Validate YAML
      run: |
        python3 -c "import yaml, pathlib; [yaml.safe_load(f.read_text()) for f in pathlib.Path('.github/workflows').glob('*.yml')]"
      continue-on-error: true
